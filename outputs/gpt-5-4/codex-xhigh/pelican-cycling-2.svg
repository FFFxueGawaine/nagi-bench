<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">海边骑自行车的鹈鹕</title>
  <desc id="desc">一只逼真而生动的鹈鹕在海边骑着复古自行车，背景是海浪、沙滩与暖色夕阳。</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ca8d2"/>
      <stop offset="52%" stop-color="#a9d7ef"/>
      <stop offset="100%" stop-color="#ffd9a8"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6cf" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffd97d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd97d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3189a9"/>
      <stop offset="45%" stop-color="#206f91"/>
      <stop offset="100%" stop-color="#0f4a68"/>
    </linearGradient>

    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecd39d"/>
      <stop offset="55%" stop-color="#d3ab67"/>
      <stop offset="100%" stop-color="#b98547"/>
    </linearGradient>

    <linearGradient id="wetSand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#91a6a3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4b6b6d" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="pelicanBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ee"/>
      <stop offset="55%" stop-color="#ddd0c0"/>
      <stop offset="100%" stop-color="#b8a898"/>
    </linearGradient>

    <linearGradient id="pelicanWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a847b"/>
      <stop offset="52%" stop-color="#635a52"/>
      <stop offset="100%" stop-color="#403933"/>
    </linearGradient>

    <linearGradient id="pelicanNeck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4eee4"/>
      <stop offset="100%" stop-color="#b7a795"/>
    </linearGradient>

    <linearGradient id="beakTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dfc7aa"/>
      <stop offset="40%" stop-color="#c7a17b"/>
      <stop offset="100%" stop-color="#9e7553"/>
    </linearGradient>

    <linearGradient id="beakPouch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5b26d"/>
      <stop offset="55%" stop-color="#df8440"/>
      <stop offset="100%" stop-color="#bb5e24"/>
    </linearGradient>

    <linearGradient id="bikePaint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a8f95"/>
      <stop offset="45%" stop-color="#2e6570"/>
      <stop offset="100%" stop-color="#173e46"/>
    </linearGradient>

    <radialGradient id="metal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="40%" stop-color="#c6d0d7"/>
      <stop offset="100%" stop-color="#7f8b93"/>
    </radialGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
